<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <filter id="paper-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply"/>
    </filter>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="turbulence"/>
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="400" fill="#f5f2ed" filter="url(#paper-grain)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#b4aa9b" stroke-width="0.5">
    <line x1="0" y1="29" x2="1200" y2="29"/><line x1="0" y1="58" x2="1200" y2="58"/>
    <line x1="0" y1="87" x2="1200" y2="87"/><line x1="0" y1="116" x2="1200" y2="116"/>
    <line x1="0" y1="145" x2="1200" y2="145"/><line x1="0" y1="174" x2="1200" y2="174"/>
    <line x1="0" y1="203" x2="1200" y2="203"/><line x1="0" y1="232" x2="1200" y2="232"/>
    <line x1="0" y1="261" x2="1200" y2="261"/><line x1="0" y1="290" x2="1200" y2="290"/>
    <line x1="0" y1="319" x2="1200" y2="319"/><line x1="0" y1="348" x2="1200" y2="348"/>
    <line x1="0" y1="377" x2="1200" y2="377"/>
    <line x1="29" y1="0" x2="29" y2="400"/><line x1="58" y1="0" x2="58" y2="400"/>
    <line x1="87" y1="0" x2="87" y2="400"/><line x1="116" y1="0" x2="116" y2="400"/>
    <line x1="145" y1="0" x2="145" y2="400"/><line x1="174" y1="0" x2="174" y2="400"/>
    <line x1="203" y1="0" x2="203" y2="400"/><line x1="232" y1="0" x2="232" y2="400"/>
    <line x1="261" y1="0" x2="261" y2="400"/><line x1="290" y1="0" x2="290" y2="400"/>
    <line x1="319" y1="0" x2="319" y2="400"/><line x1="348" y1="0" x2="348" y2="400"/>
    <line x1="377" y1="0" x2="377" y2="400"/><line x1="406" y1="0" x2="406" y2="400"/>
    <line x1="435" y1="0" x2="435" y2="400"/><line x1="464" y1="0" x2="464" y2="400"/>
    <line x1="493" y1="0" x2="493" y2="400"/><line x1="522" y1="0" x2="522" y2="400"/>
    <line x1="551" y1="0" x2="551" y2="400"/><line x1="580" y1="0" x2="580" y2="400"/>
    <line x1="609" y1="0" x2="609" y2="400"/><line x1="638" y1="0" x2="638" y2="400"/>
    <line x1="667" y1="0" x2="667" y2="400"/><line x1="696" y1="0" x2="696" y2="400"/>
    <line x1="725" y1="0" x2="725" y2="400"/><line x1="754" y1="0" x2="754" y2="400"/>
    <line x1="783" y1="0" x2="783" y2="400"/><line x1="812" y1="0" x2="812" y2="400"/>
    <line x1="841" y1="0" x2="841" y2="400"/><line x1="870" y1="0" x2="870" y2="400"/>
    <line x1="899" y1="0" x2="899" y2="400"/><line x1="928" y1="0" x2="928" y2="400"/>
    <line x1="957" y1="0" x2="957" y2="400"/><line x1="986" y1="0" x2="986" y2="400"/>
    <line x1="1015" y1="0" x2="1015" y2="400"/><line x1="1044" y1="0" x2="1044" y2="400"/>
    <line x1="1073" y1="0" x2="1073" y2="400"/><line x1="1102" y1="0" x2="1102" y2="400"/>
    <line x1="1131" y1="0" x2="1131" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
  </g>

  <!-- Decorative graph nodes (left side) -->
  <g filter="url(#sketch)" opacity="0.15">
    <!-- Scattered nodes - left cluster -->
    <circle cx="120" cy="100" r="8" fill="#4a4540" opacity="0.6"/>
    <circle cx="180" cy="140" r="5" fill="none" stroke="#4a4540" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="90" cy="180" r="12" fill="#4a4540" opacity="0.2"/>
    <circle cx="160" cy="220" r="6" fill="#4a4540" opacity="0.5"/>
    <circle cx="220" cy="90" r="4" fill="#4a4540" opacity="0.4"/>
    <line x1="120" y1="100" x2="180" y2="140" stroke="#a09888" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="120" y1="100" x2="90" y2="180" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="180" y1="140" x2="160" y2="220" stroke="#a09888" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="90" y1="180" x2="160" y2="220" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="120" y1="100" x2="220" y2="90" stroke="#cdc6bb" stroke-width="0.5"/>

    <!-- Right cluster -->
    <circle cx="1020" cy="120" r="10" fill="#4a4540" opacity="0.5"/>
    <circle cx="1080" cy="180" r="6" fill="none" stroke="#4a4540" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="1050" cy="260" r="14" fill="#4a4540" opacity="0.15"/>
    <circle cx="1120" cy="100" r="5" fill="#4a4540" opacity="0.4"/>
    <circle cx="980" cy="220" r="7" fill="#4a4540" opacity="0.3"/>
    <line x1="1020" y1="120" x2="1080" y2="180" stroke="#a09888" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="1080" y1="180" x2="1050" y2="260" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="1020" y1="120" x2="1120" y2="100" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="1020" y1="120" x2="980" y2="220" stroke="#a09888" stroke-width="0.8" stroke-dasharray="4,3"/>
    <line x1="980" y1="220" x2="1050" y2="260" stroke="#cdc6bb" stroke-width="0.5"/>

    <!-- Bottom scattered -->
    <circle cx="300" cy="320" r="4" fill="#4a4540" opacity="0.3"/>
    <circle cx="400" cy="340" r="6" fill="#4a4540" opacity="0.2"/>
    <circle cx="800" cy="310" r="5" fill="none" stroke="#4a4540" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="900" cy="340" r="3" fill="#4a4540" opacity="0.4"/>
    <line x1="300" y1="320" x2="400" y2="340" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="800" y1="310" x2="900" y2="340" stroke="#cdc6bb" stroke-width="0.5"/>
  </g>

  <!-- Central icon: brain/network -->
  <g transform="translate(600, 155)" filter="url(#sketch)">
    <!-- Central hub node -->
    <circle cx="0" cy="0" r="18" fill="#4a4540" opacity="0.85"/>
    <!-- Orbiting nodes -->
    <circle cx="-50" cy="-35" r="10" fill="#4a4540" opacity="0.6"/>
    <circle cx="55" cy="-30" r="8" fill="#4a4540" opacity="0.5"/>
    <circle cx="45" cy="40" r="12" fill="#4a4540" opacity="0.4"/>
    <circle cx="-45" cy="45" r="7" fill="none" stroke="#4a4540" stroke-width="1.5" stroke-dasharray="4,3"/>
    <circle cx="0" cy="-55" r="6" fill="#4a4540" opacity="0.35"/>
    <circle cx="-70" cy="10" r="9" fill="#4a4540" opacity="0.25"/>
    <circle cx="70" cy="5" r="5" fill="none" stroke="#4a4540" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Edges -->
    <line x1="0" y1="0" x2="-50" y2="-35" stroke="#8a8279" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="0" y1="0" x2="55" y2="-30" stroke="#8a8279" stroke-width="1.5" stroke-dasharray="5,3"/>
    <line x1="0" y1="0" x2="45" y2="40" stroke="#cdc6bb" stroke-width="1"/>
    <line x1="0" y1="0" x2="-45" y2="45" stroke="#cdc6bb" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-55" stroke="#a09888" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="0" y1="0" x2="-70" y2="10" stroke="#cdc6bb" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="70" y2="5" stroke="#cdc6bb" stroke-width="0.8"/>
    <line x1="-50" y1="-35" x2="0" y2="-55" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="55" y1="-30" x2="0" y2="-55" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="45" y1="40" x2="70" y2="5" stroke="#cdc6bb" stroke-width="0.5"/>
    <line x1="-45" y1="45" x2="-70" y2="10" stroke="#cdc6bb" stroke-width="0.5"/>
  </g>

  <!-- Title text -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#2c2825" letter-spacing="2">
    Contextual Neural Map
  </text>

  <!-- Subtitle -->
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#8a8279" letter-spacing="4" font-style="italic">
    Turn any folder into a beautiful knowledge graph
  </text>

  <!-- Tech badges line -->
  <g transform="translate(600, 345)" text-anchor="middle">
    <text font-family="monospace" font-size="11" fill="#a09888" letter-spacing="3">
      D3.js  ·  Force-Directed  ·  Self-Contained HTML  ·  Zero Config
    </text>
  </g>
</svg>
